<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoTag — Marques</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-50:  #f0faf4;
      --green-100: #d4f0df;
      --green-400: #4ade80;
      --green-600: #16a34a;
      --green-700: #15803d;
      --green-800: #166534;
      --green-900: #14532d;
      --amber-400: #fbbf24;
      --amber-600: #d97706;
      --red-400:   #f87171;
      --red-600:   #dc2626;
      --gray-50:   #f9fafb;
      --gray-100:  #f3f4f6;
      --gray-200:  #e5e7eb;
      --gray-400:  #9ca3af;
      --gray-600:  #4b5563;
      --gray-800:  #1f2937;
      --bg: #fafaf8;
      --text: #1a1a18;
      --text-muted: #5a5a56;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-200);
    }
    .nav {
      max-width: 1200px; margin: 0 auto;
      padding: 0 2rem;
      height: 68px;
      display: flex; align-items: center; justify-content: space-between; gap: 2rem;
    }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); font-weight: 600; font-size: 1.15rem; }
    .logo strong { color: var(--green-700); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 0.9rem; transition: color .2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--green-700); }
    .nav-cta {
      background: var(--green-700); color: #fff;
      border: none; border-radius: var(--radius-md);
      padding: 0.5rem 1.2rem; font-size: 0.875rem; font-family: inherit; font-weight: 500;
      cursor: pointer; transition: background .2s;
    }
    .nav-cta:hover { background: var(--green-800); }

    /* ── PAGE HEADER ── */
    .page-hero {
      background: linear-gradient(135deg, var(--green-50) 0%, #fff 60%);
      border-bottom: 1px solid var(--gray-200);
      padding: 3.5rem 2rem 3rem;
      text-align: center;
    }
    .page-hero .tag {
      display: inline-block;
      background: var(--green-100); color: var(--green-800);
      font-size: 0.78rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
      padding: 4px 14px; border-radius: 99px; margin-bottom: 1.2rem;
    }
    .page-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    .page-hero h1 em { font-style: italic; color: var(--green-700); }
    .page-hero p { color: var(--text-muted); max-width: 560px; margin: 0 auto 2rem; line-height: 1.7; }

    /* ── SEARCH / FILTER ── */
    .controls {
      max-width: 1200px; margin: 2.5rem auto 0;
      padding: 0 2rem;
      display: flex; flex-wrap: wrap; align-items: center; gap: 1rem;
    }
    .search-box {
      flex: 1; min-width: 220px;
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid var(--gray-200);
      border-radius: var(--radius-md); padding: 0 1rem; height: 44px;
    }
    .search-box input {
      border: none; outline: none; font-family: inherit; font-size: 0.9rem;
      background: transparent; flex: 1; color: var(--text);
    }
    .search-box input::placeholder { color: var(--gray-400); }
    .search-icon { color: var(--gray-400); font-size: 0.95rem; }

    .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      padding: 6px 14px; border-radius: 99px; border: 1px solid var(--gray-200);
      font-size: 0.82rem; font-weight: 500; background: #fff; cursor: pointer;
      transition: all .2s; color: var(--text-muted);
    }
    .pill:hover { border-color: var(--green-600); color: var(--green-700); }
    .pill.active { background: var(--green-700); color: #fff; border-color: var(--green-700); }

    .sort-select {
      height: 44px; padding: 0 1rem; border: 1px solid var(--gray-200);
      border-radius: var(--radius-md); font-family: inherit; font-size: 0.875rem;
      background: #fff; color: var(--text); cursor: pointer; outline: none;
    }
    .sort-select:focus { border-color: var(--green-600); }

    .results-count {
      max-width: 1200px; margin: 1rem auto 0; padding: 0 2rem;
      font-size: 0.82rem; color: var(--text-muted);
    }

    /* ── GRID ── */
    .brands-grid {
      max-width: 1200px; margin: 1.5rem auto 4rem;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    /* ── BRAND CARD ── */
    .brand-card {
      background: #fff; border: 1px solid var(--gray-200);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .brand-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,.07);
    }

    .card-top {
      padding: 1.4rem 1.5rem 1rem;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
    }
    .brand-identity { display: flex; align-items: center; gap: 12px; }
    .brand-logo-circle {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 700; flex-shrink: 0;
    }
    .brand-name { font-size: 1.05rem; font-weight: 600; }
    .brand-category { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    /* Score ring (small) */
    .score-ring { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
    .score-ring svg { width: 56px; height: 56px; transform: rotate(-90deg); }
    .score-ring .track { fill: none; stroke: var(--gray-100); stroke-width: 5; }
    .score-ring .fill  { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    .score-ring .score-inner {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      line-height: 1;
    }
    .score-ring .score-num { font-size: 0.95rem; font-weight: 700; }
    .score-ring .score-sub { font-size: 0.6rem; color: var(--text-muted); }

    /* Grade badge */
    .grade-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 99px;
      font-size: 0.78rem; font-weight: 600; margin: 0 1.5rem .9rem;
    }
    .grade-badge.A { background: #dcfce7; color: #166534; }
    .grade-badge.B { background: #d1fae5; color: #065f46; }
    .grade-badge.C { background: #fef9c3; color: #854d0e; }
    .grade-badge.D { background: #fee2e2; color: #991b1b; }
    .grade-badge.E { background: #fce7f3; color: #9d174d; }

    /* Metrics row */
    .card-metrics {
      display: grid; grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--gray-100);
    }
    .metric-cell {
      padding: .8rem .6rem; text-align: center;
      border-right: 1px solid var(--gray-100);
    }
    .metric-cell:last-child { border-right: none; }
    .metric-cell .m-val { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .metric-cell .m-lbl { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

    /* Progress bars */
    .card-bars { padding: .8rem 1.5rem 1.2rem; display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-label { font-size: 0.75rem; color: var(--text-muted); width: 74px; flex-shrink: 0; }
    .bar-track { flex: 1; height: 5px; background: var(--gray-100); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 1s ease; }
    .bar-val { font-size: 0.75rem; font-weight: 500; width: 28px; text-align: right; flex-shrink: 0; }

    /* Card footer */
    .card-footer {
      padding: .6rem 1.5rem 1.2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .certifs { display: flex; flex-wrap: wrap; gap: 4px; }
    .certif-chip {
      background: var(--gray-100); color: var(--gray-600);
      font-size: 0.7rem; padding: 2px 8px; border-radius: 99px;
    }
    .detail-btn {
      background: none; border: 1px solid var(--gray-200);
      border-radius: var(--radius-md); padding: 5px 12px;
      font-size: 0.78rem; font-family: inherit; cursor: pointer;
      color: var(--text-muted); transition: all .2s;
    }
    .detail-btn:hover { border-color: var(--green-600); color: var(--green-700); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 1rem; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: var(--radius-xl);
      max-width: 600px; width: 100%; max-height: 90vh;
      overflow-y: auto; transform: translateY(20px); transition: transform .25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 1.75rem; border-bottom: 1px solid var(--gray-200);
      position: sticky; top: 0; background: #fff; z-index: 1;
    }
    .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
    .modal-close {
      background: var(--gray-100); border: none; border-radius: 50%;
      width: 34px; height: 34px; font-size: 1rem; cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-body { padding: 1.5rem 1.75rem; }
    .modal-section { margin-bottom: 1.5rem; }
    .modal-section h3 {
      font-size: 0.8rem; font-weight: 600; letter-spacing: .05em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: .75rem;
    }
    .modal-section p { font-size: 0.9rem; line-height: 1.7; color: var(--text); }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-metric {
      background: var(--gray-50); border-radius: var(--radius-md);
      padding: 1rem; text-align: center;
    }
    .modal-metric .mm-val { font-size: 1.3rem; font-weight: 700; color: var(--green-700); }
    .modal-metric .mm-lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .timeline { list-style: none; }
    .timeline li { display: flex; gap: 12px; padding: .5rem 0; font-size: 0.875rem; }
    .timeline li::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: var(--green-600); flex-shrink: 0; margin-top: 5px;
    }
    .timeline li.bad::before { background: var(--red-400); }
    .modal-cta {
      margin-top: 1.5rem;
      background: var(--green-700); color: #fff;
      border: none; border-radius: var(--radius-md); padding: .75rem 1.5rem;
      font-family: inherit; font-size: 0.9rem; font-weight: 500; cursor: pointer;
      width: 100%; transition: background .2s;
    }
    .modal-cta:hover { background: var(--green-800); }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 4rem 2rem; color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

    /* ── FOOTER ── */
    .footer { background: #fff; border-top: 1px solid var(--gray-200); padding: 2rem; text-align: center; }
    .footer p { font-size: 0.83rem; color: var(--text-muted); }

    @media (max-width: 640px) {
      .nav-links, .nav-cta { display: none; }
      .brands-grid { grid-template-columns: 1fr; }
      .modal-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<!-- ── PAGE HERO ── -->
<section class="page-hero">
  <span class="tag">Annuaire</span>
  <h1>Les marques de mode<br/><em>passées au crible</em></h1>
  <p>Découvrez le score éco-responsable de vos marques préférées : fast fashion, premium, sport et bien plus.</p>

<!-- ── CONTROLS ── -->
<div class="controls">

    <span class="search-icon">🔍</span>

  <div class="filter-pills" id="filter-pills">
    <button class="pill active" data-cat="all" onclick="setFilter(this,'all')">Toutes</button>

    <button class="pill" data-cat="Premium" onclick="setFilter(this,'Premium')">Premium</button>
    <button class="pill" data-cat="Sport" onclick="setFilter(this,'Sport')">Sport</button>
    <button class="pill" data-cat="Écoresponsable" onclick="setFilter(this,'Écoresponsable')">Écoresponsable</button>
    <button class="pill" data-cat="Luxe" onclick="setFilter(this,'Luxe')">Luxe</button>
  </div>
  <select class="sort-select" id="sort-select" onchange="filterBrands()">

    <option value="score-asc">Moins bon score</option>
    <option value="az">A → Z</option>
    <option value="za">Z → A</option>

</div>
<p class="results-count" id="results-count"></p>

<!-- ── BRANDS GRID ── -->
<div class="brands-grid" id="brands-grid"></div>

<!-- ── FOOTER ── -->
<footer class="footer">
  <p>© 2025 EcoTag — Pour une mode éco-responsable 🌿</p>
</footer>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h2 id="modal-title">—</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

let currentFilter = "all";

function scoreColor(s) {
  if (s >= 75) return "#16a34a";
  if (s >= 50) return "#ca8a04";
  return "#dc2626";
}

function barColor(v) {
  if (v >= 65) return "#16a34a";
  if (v >= 40) return "#f59e0b";
  return "#ef4444";
}

function circumference(r) { return 2 * Math.PI * r; }

function buildCard(b) {
  const C = 157; // circumference for r=25
  const offset = C - (b.score / 100) * C;
  const color = scoreColor(b.score);
  const barsHtml = Object.entries(b.bars).map(([k, v]) =>
    `<div class="bar-row">
      <span class="bar-label">${k.charAt(0).toUpperCase()+k.slice(1)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${barColor(v)}"></div></div>
      <span class="bar-val" style="color:${barColor(v)}">${v}</span>
    </div>`
  ).join('');
  const certsHtml = b.certs.length
    ? b.certs.map(c => `<span class="certif-chip">${c}</span>`).join('')
    : `<span class="certif-chip" style="color:#dc2626">Aucune certif.</span>`;

  return `
  <div class="brand-card" id="card-${b.id}" onclick="openModal(${b.id})">
    <div class="card-top">
      <div class="brand-identity">
        <div class="brand-logo-circle" style="background:${b.bg};color:${b.color}">${b.initials}</div>
        <div>
          <div class="brand-name">${b.name}</div>
          <div class="brand-category">${b.category}</div>
        </div>
      </div>
      <div class="score-ring">
        <svg viewBox="0 0 56 56">
          <circle class="track" cx="28" cy="28" r="22" stroke-width="5" fill="none" stroke="#f3f4f6"/>
          <circle class="fill" cx="28" cy="28" r="22" stroke-width="5" fill="none"
            stroke="${color}" stroke-linecap="round"
            stroke-dasharray="${circumference(22).toFixed(1)}"
            stroke-dashoffset="${(circumference(22) - (b.score/100)*circumference(22)).toFixed(1)}"
            transform="rotate(-90 28 28)"/>
        </svg>
        <div class="score-inner">
          <span class="score-num" style="color:${color}">${b.score}</span>
          <span class="score-sub">/100</span>
        </div>
      </div>
    </div>
    <div style="padding:0 1.5rem .8rem">
      <span class="grade-badge ${b.grade}">Grade ${b.grade}</span>
    </div>
    <div class="card-metrics">
      <div class="metric-cell"><div class="m-val">${b.co2} kg</div><div class="m-lbl">CO₂</div></div>
      <div class="metric-cell"><div class="m-val">${b.water} L</div><div class="m-lbl">Eau</div></div>
      <div class="metric-cell"><div class="m-val">${b.recyclability}</div><div class="m-lbl">Recyclable</div></div>
    </div>
    <div class="card-bars">${barsHtml}</div>
    <div class="card-footer">
      <div class="certifs">${certsHtml}</div>
      <button class="detail-btn">Détail →</button>
    </div>
  </div>`;
}

function filterBrands() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;
  let list = BRANDS.filter(b => {
    const matchCat = currentFilter === 'all' || b.category === currentFilter;
    const matchQ = b.name.toLowerCase().includes(q) || b.category.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  if (sort === 'score-desc') list.sort((a,b) => b.score - a.score);
  else if (sort === 'score-asc') list.sort((a,b) => a.score - b.score);
  else if (sort === 'az') list.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'za') list.sort((a,b) => b.name.localeCompare(a.name));

  const grid = document.getElementById('brands-grid');
  document.getElementById('results-count').textContent = `${list.length} marque${list.length>1?'s':''} trouvée${list.length>1?'s':''}`;
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Aucune marque ne correspond à votre recherche.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(buildCard).join('');
}

function setFilter(el, cat) {
  currentFilter = cat;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  filterBrands();
}

function openModal(id) {
  const b = BRANDS.find(x => x.id === id);
  if (!b) return;
  document.getElementById('modal-title').textContent = b.name;
  const pos = b.positives.map(p => `<li>${p}</li>`).join('');
  const neg = b.negatives.map(p => `<li class="bad">${p}</li>`).join('');
  const extra = Object.entries(b.metrics_extra).map(([k,v]) =>
    `<div class="modal-metric"><div class="mm-val">${v}</div><div class="mm-lbl">${k}</div></div>`
  ).join('');
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <h3>Présentation</h3>
      <p>${b.desc}</p>
    </div>
    <div class="modal-section">
      <h3>Chiffres clés</h3>
      <div class="modal-grid">${extra}</div>
    </div>
    <div class="modal-section">
      <h3>Points forts & points faibles</h3>
      <ul class="timeline">${pos}${neg}</ul>
    </div>
    <div class="modal-section">
      <h3>Certifications</h3>
      <p>${b.certs.length ? b.certs.join(' · ') : 'Aucune certification indépendante reconnue.'}</p>
    </div>
    <button class="modal-cta" onclick="window.location='index.html#scanner'">📷 Scanner un produit ${b.name}</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

filterBrands();
</script>
